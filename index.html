            ensureAutoFillTimer(autoFillSignature);
        }

        function renderNormalTurn() {
            clearAutoFillTimer(); // the 5s auto-fill clock doesn't apply here - the 30s bidding clock does
            document.getElementById('bidSliderContainer').classList.remove('hidden');
            document.getElementById('normalActionBtns').classList.remove('hidden');
            document.getElementById('autoFillActionBtn').classList.add('hidden');
            document.getElementById('hostSkipBtn').classList.toggle('hidden', !(isOnline && amIHost));

            const currentPlayer = players[currentTurnIndex];

            const arenaEl = document.getElementById('gameArena');
            arenaEl.style.backgroundColor = currentPlayer.color.bg;
            arenaEl.style.borderColor = currentPlayer.color.border;
            highlightColumn(currentTurnIndex, currentPlayer.color);

            document.getElementById('currentLot').innerText = currentLotItem.name;
            document.getElementById('currentLotTeam').innerText = currentLotItem.team;

            document.getElementById('bidDisplay').innerText = `$${gameState.currentBid}`;
            document.getElementById('bidder').innerText = `(מוביל: ${players[leadingBidderIndex].name})`;
            document.getElementById('turnDisplay').innerText = `${currentPlayer.name}`;

            // A fresh 30s clock for every distinct turn - this signature changes on essentially
            // every action (bid/pass), so a genuinely new turn always resets it.
            const turnSignature = `${currentTurnIndex}|${currentRoundCounter}|${gameState.currentBid}|${gameState.isInitial}|${leadingBidderIndex}`;
            ensureTurnTimer(turnSignature);

            const p = players[currentTurnIndex];
            const maxBid = p.money - (settings.teamSize - p.roster.length - 1);
            const minBid = gameState.currentBid + 1;

            const slider = document.getElementById('bidRange');
            const submitBtn = document.getElementById('submitBidBtn');
            const passBtn = document.getElementById('passBtn');

            if (gameState.isInitial && currentTurnIndex === leadingBidderIndex) {
                passBtn.innerText = "פתח ב-$1";
                passBtn.className = "btn btn-continue";
            } else {
                passBtn.innerText = "ויתור ❌";
                passBtn.className = "btn btn-pass";
            }

            const isMyTurn = !isOnline || mySeatIndex === currentTurnIndex;
            if (isOnline && !isMyTurn) {
                document.getElementById('bidder').innerText = `(מוביל: ${players[leadingBidderIndex].name}) — ממתין ל${currentPlayer.name}...`;
                slider.disabled = true;
                submitBtn.disabled = true;
                passBtn.disabled = true;
                document.getElementById('sliderAmountDisplay').innerText = "לא תורך";
                return;
            }
            passBtn.disabled = false;

            if (minBid > maxBid || p.roster.length >= settings.teamSize) {
                slider.disabled = true;
                submitBtn.disabled = true;
                document.getElementById('sliderAmountDisplay').innerText = p.roster.length >= settings.teamSize ? "מלא" : "אין תקציב";
            } else {
                slider.disabled = false;
                submitBtn.disabled = false;
                slider.min = minBid;
                slider.max = maxBid;
                slider.value = minBid;
                document.getElementById('minRangeLabel').innerText = `$${minBid}`;
                document.getElementById('maxRangeLabel').innerText = `$${maxBid}`;
                document.getElementById('sliderAmountDisplay').innerText = `$${minBid}`;
            }
        }

        function updateRosterList(id, arr) {
            const el = document.getElementById(id);
            el.innerHTML = '';
            for (let i = 1; i <= settings.teamSize; i++) {
                const item = arr[i - 1];
                if (item) {
                    el.innerHTML += `<li>(${item.round}) ${i}. ${escapeHtml(item.text)}</li>`;
                } else {
                    el.innerHTML += `<li>${i}. -</li>`;
                }
            }
        }

        // ---------- Mid-game persistence (survive an accidental refresh) ----------
        function saveGameState() {
            try {
                const snapshot = {
                    settings, players, currentTurnIndex, leadingBidderIndex, roundStarterIndex,
                    currentLotItem, currentRoundCounter, filteredPlayers, gameState, autoFillState,
                    mainTitle: document.getElementById('mainTitle').innerText
                };
                localStorage.setItem(LS_GAME, JSON.stringify(snapshot));
            } catch (err) {
                console.error("שגיאה בשמירת מצב המשחק", err);
            }
        }

        function restoreGameState(snapshot) {
            settings = { ...DEFAULT_SETTINGS, ...(snapshot.settings || {}) };
            players = snapshot.players || [];
            currentTurnIndex = snapshot.currentTurnIndex || 0;
            leadingBidderIndex = snapshot.leadingBidderIndex || 0;
            roundStarterIndex = snapshot.roundStarterIndex || 0;
            currentLotItem = snapshot.currentLotItem || null;
            currentRoundCounter = snapshot.currentRoundCounter || 1;
            filteredPlayers = snapshot.filteredPlayers || [];
            gameState = snapshot.gameState || { currentBid: 1, isInitial: true };
            autoFillState = snapshot.autoFillState || { active: false, playerId: null };

            document.getElementById('mainTitle').innerText = snapshot.mainTitle || document.getElementById('mainTitle').innerText;

            const dashboard = document.getElementById('screenshotArea');
            dashboard.innerHTML = '';
            players.forEach(p => { dashboard.innerHTML += playerColumnHtml(p); });

            document.getElementById('setupPanel').classList.add('hidden');
            document.getElementById('gamePanel').classList.remove('hidden');
            document.getElementById('summaryPanel').classList.add('hidden');

            renderUI();
        }

        // ---------- Sharing ----------
        async function shareScreenshot() {
            const targetElement = document.querySelector("#finalTeamsContainer .teams-dashboard");
            const shareBtn = document.getElementById('shareBtn');
            shareBtn.innerText = "מכין תמונה... ⏳";
            shareBtn.disabled = true;

            try {
                const canvas = await html2canvas(targetElement, {
                    backgroundColor: "#162447",
                    scale: 2
                });

                canvas.toBlob(async (blob) => {
                    if (!blob) {
                        alert("שגיאה ביצירת התמונה");
                        return;
                    }
                    const file = new File([blob], "auction_results.png", { type: "image/png" });

                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            files: [file],
                            title: 'תוצאות מכירה פומבית',
                            text: 'קבלו את תוצאות המכירה הפומבית של הליגה!'
                        });
                    } else {
                        const link = document.createElement('a');
                        link.download = 'auction_results.png';
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                        alert("הדפדפן שלך לא תומך בשיתוף ישיר. התמונה הורדה למכשיר שלך, כעת תוכל לשלוח אותה ידנית!");
                    }
                    shareBtn.innerText = "📸 שתף צילום מסך";
                    shareBtn.disabled = false;
                }, 'image/png');

            } catch (err) {
                console.error("שגיאה בשיתוף התמונה:", err);
                alert("קרתה שגיאה במהלך יצירת התמונה.");
                shareBtn.innerText = "📸 שתף צילום מסך";
                shareBtn.disabled = false;
            }
        }
    </script>
</body>
