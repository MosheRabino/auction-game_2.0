<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מכירה פומבית - ליגות חכמות</title>
    <style>
        :root {
            --bg-color: #1a1a2e; --card-bg: #162447; --accent-color: #00d2fc;
            --text-color: #ffffff; --muted-text: #b0b0b0; --success-color: #4cd137; --danger-color: #e84118;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { width: 100%; max-width: 600px; text-align: center; margin-bottom: 20px; }
        h1 { color: var(--accent-color); font-size: 1.8rem; }
        .container { width: 100%; max-width: 600px; }
        .panel { background-color: var(--card-bg); border-radius: 12px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); margin-bottom: 20px; }
        h2 { margin-bottom: 15px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; font-size: 1.2rem; }
        .setup-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .name-input, select { width: 100%; background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 6px; color: white; font-size: 1rem; outline: none; }
        select option { background: var(--card-bg); color: white; }
        .btn { background-color: var(--accent-color); color: #000; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; width: 100%; margin-bottom: 10px; }
        .btn:disabled { background-color: #555 !important; color: #aaa !important; }
        .btn-secondary { background-color: #34495e; color: white; font-size: 0.9rem; padding: 8px 16px; margin-bottom: 15px; width: auto; align-self: center; }
        
        .teams-toggle-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px; }
        .team-item { display: flex; align-items: center; gap: 8px; font-size: 0.95rem; cursor: pointer; }
        .team-item input { width: 18px; height: 18px; accent-color: var(--accent-color); }
        .toggle-all-btn { background: none; border: none; color: var(--accent-color); cursor: pointer; text-decoration: underline; font-size: 0.9rem; text-align: right; margin-bottom: 5px; }

        .arena { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 20px; text-align: center; border: 1px dashed rgba(255,255,255,0.2); margin-bottom: 20px; display: flex; flex-direction: column; transition: background-color 0.4s ease, border-color 0.4s ease; }
        .turn-indicator { font-size: 1.2rem; font-weight: bold; color: #f1c40f; margin-bottom: 15px; background: rgba(241, 196, 15, 0.1); padding: 8px 15px; border-radius: 6px; display: inline-block; align-self: center; }
        .lot-name { font-size: 2rem; color: #ffffff; font-weight: bold; margin-bottom: 2px; }
        .lot-team { font-size: 0.95rem; color: var(--accent-color); margin-bottom: 20px; }
        .bid-slider-container { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin: 20px 0; }
        .slider-row { display: flex; align-items: center; gap: 10px; }
        .range-slider { flex-grow: 1; accent-color: var(--accent-color); }
        .slider-val { font-size: 1.4rem; font-weight: bold; color: var(--success-color); min-width: 60px; }
        .action-btns { display: flex; gap: 12px; }
        .btn-pass { background-color: var(--danger-color); color: white; }
        .btn-continue { background-color: var(--success-color); color: white; }
        
        .teams-dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; background: rgba(0, 0, 0, 0.15); padding: 15px; border-radius: 12px; }
        .player-column { display: flex; flex-direction: column; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; text-align: right; border: 2px solid transparent; transition: all 0.4s ease; }
        .budget { color: var(--success-color); font-weight: bold; font-size: 1.1rem; margin-bottom: 8px; }
        .roster-list { list-style: none; }
        .roster-list li { font-size: 0.82rem; padding: 6px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); color: var(--muted-text); word-break: break-all; }
        .summary-layout { text-align: center; background: var(--card-bg); border-radius: 16px; padding: 30px; border: 2px solid var(--accent-color); }
        .hidden { display: none !important; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <header>
        <h1 id="mainTitle">🏆 מכירה פומבית - בחירת ליגה</h1>
    </header>

    <div class="container">

        <div class="panel" id="setupPanel">
            <h2>כמות שחקנים במכירה</h2>
            <div class="setup-row" style="margin-bottom: 20px;">
                <select id="playerCountSelect" onchange="adjustPlayerInputs()">
                    <option value="2" selected>2 שחקנים</option>
                    <option value="3">3 שחקנים</option>
                    <option value="4">4 שחקנים</option>
                </select>
            </div>

            <h2>שמות השחקנים</h2>
            <div class="setup-row" id="playerNamesContainer">
                <input type="text" class="name-input player-name-field" maxlength="12" value="שחקן 1">
                <input type="text" class="name-input player-name-field" maxlength="12" value="שחקן 2">
            </div>

            <h2>בחר ליגה פתוחה</h2>
            <div class="setup-row">
                <select id="leagueSelect" onchange="loadLeagueData()">
                    <option value="">טוען ליגות מתוך Leagues.json...</option>
                </select>
            </div>

            <h2 style="margin-top: 15px;">קבוצות שחולצו מהקובץ</h2>
            <button class="toggle-all-btn" onclick="toggleAllTeams()">סמן/בטל הכל</button>
            <div class="teams-toggle-list" id="teamsCheckboxes"></div>

            <button class="btn" id="startBtn" onclick="startGame()">גמרנו, התחל משחק! 🚀</button>
        </div>

        <div class="game-layout hidden" id="gamePanel">
            <button class="btn btn-secondary" onclick="resetToHome()">🏠 חזרה לעמוד הראשי</button>

            <div class="arena" id="gameArena">
                <div class="turn-indicator" id="turnDisplay">-</div>
                <div class="lot-name" id="currentLot">-</div>
                <div class="lot-team" id="currentLotTeam">-</div>
                
                <div style="margin: 15px 0; font-size: 1.1rem;">
                    הצעה מובילה: <strong id="bidDisplay" style="color: var(--accent-color); font-size: 1.4rem;">$1</strong> 
                    <span id="bidder" style="color: var(--muted-text);">(מוביל: -)</span>
                </div>

                <div class="bid-slider-container">
                    <div class="slider-row">
                        <span id="minRangeLabel">$2</span>
                        <input type="range" id="bidRange" class="range-slider" min="2" max="20" value="2" oninput="document.getElementById('sliderAmountDisplay').innerText = '$'+this.value">
                        <span id="maxRangeLabel">$20</span>
                        <div class="slider-val" id="sliderAmountDisplay">$2</div>
                    </div>
                </div>
                
                <div class="action-btns">
                    <button class="btn" id="submitBidBtn" onclick="handleAction('bid')">אישור הצעה</button>
                    <button class="btn btn-pass" id="passBtn" onclick="handleAction('pass')">ויתור</button>
                </div>
            </div>

            <div class="teams-dashboard" id="screenshotArea"></div>
        </div>

        <div class="summary-layout hidden" id="summaryPanel">
            <h2>🏁 המכירה הפומבית הסתיימה!</h2>
            <div style="margin: 10px 0; font-size: 1.1rem; color: var(--muted-text)">אלו הסגלים הסופיים שלכם:</div>
            
            <div id="finalTeamsContainer" style="margin-bottom: 25px; margin-top: 20px;"></div>
            
            <button class="btn" id="shareBtn" onclick="shareScreenshot()" style="background-color: var(--success-color); color: black;">📸 שתף צילום מסך</button>
            <button class="btn btn-secondary" onclick="location.reload()" style="display: block; margin: 10px auto;">משחק חדש 🔄</button>
        </div>

    </div>

    <script>
        let loadedPlayers = [];   
        let filteredPlayers = []; 
        let fileCache = {};       

        let players = [];
        let currentTurnIndex = 0;
        let leadingBidderIndex = 0;
        let currentLotItem = null; 
        let currentRoundCounter = 1; // מונה הסיבובים הכללי של המשחק

        const playerColors = [
            { name: "כחול עמוק", bg: "rgba(41, 128, 185, 0.25)", border: "#2980b9" },
            { name: "ירוק זית עדין", bg: "rgba(39, 174, 96, 0.23)", border: "#27ae60" },
            { name: "סגול חציל רך", bg: "rgba(142, 68, 173, 0.25)", border: "#8e44ad" },
            { name: "כתום ענבר עמוק", bg: "rgba(211, 84, 0, 0.23)", border: "#d35400" }
        ];

        let gameState = {
            currentBid: 1,
            isInitial: true
        };

        window.onload = async function() {
            adjustPlayerInputs(); 
            const select = document.getElementById('leagueSelect');
            try {
                const indexResponse = await fetch('Leagues.json');
                if (!indexResponse.ok) throw new Error("קובץ Leagues.json לא נמצא.");
                
                const jsonFiles = await indexResponse.json();
                select.innerHTML = '';
                
                for (let fileName of jsonFiles) {
                    try {
                        const response = await fetch(fileName);
                        if (!response.ok) continue;
                        const data = await response.json();
                        fileCache[fileName] = data;

                        const leagueName = data[0].laegue || data[0].league || fileName;
                        select.innerHTML += `<option value="${fileName}">${leagueName}</option>`;
                    } catch (err) {
                        console.error(`שגיאה בטעינת קובץ: ${fileName}`, err);
                    }
                }

                if(select.options.length > 0) {
                    loadLeagueData();
                } else {
                    select.innerHTML = '<option value="">לא נמצאו ליגות תקינות</option>';
                }
            } catch (err) {
                alert("שגיאה קריטית: ודא שקיים קובץ בשם 'Leagues.json' באותה התיקייה בדיוק.");
                console.error(err);
            }
        };

        function adjustPlayerInputs() {
            const count = parseInt(document.getElementById('playerCountSelect').value);
            const container = document.getElementById('playerNamesContainer');
            container.innerHTML = '';
            
            for(let i = 1; i <= count; i++) {
                container.innerHTML += `<input type="text" class="name-input player-name-field" maxlength="12" value="שחקן ${i}">`;
            }
        }

        function loadLeagueData() {
            const selectedFile = document.getElementById('leagueSelect').value;
            const fullData = fileCache[selectedFile];
            if (!fullData) return;

            const rawList = fullData.filter(item => item.name && item.team);
            const seen = new Set();
            loadedPlayers = [];
            
            rawList.forEach(p => {
                const uniqueKey = `${p.name.trim()}_${p.team.trim()}`;
                if (!seen.has(uniqueKey)) {
                    seen.add(uniqueKey);
                    loadedPlayers.push({
                        name: p.name.trim(),
                        team: p.team.trim()
                    });
                }
            });

            generateTeamCheckboxes();
        }

        function generateTeamCheckboxes() {
            const container = document.getElementById('teamsCheckboxes');
            container.innerHTML = '';
            const uniqueTeams = [...new Set(loadedPlayers.map(p => p.team))].filter(Boolean);
            uniqueTeams.sort();

            uniqueTeams.forEach(team => {
                container.innerHTML += `
                    <label class="team-item">
                        <input type="checkbox" class="team-cb" value="${team}" checked>
                        <span>${team}</span>
                    </label>
                `;
            });
        }

        function toggleAllTeams() {
            const checkboxes = document.querySelectorAll('.team-cb');
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);
            checkboxes.forEach(cb => cb.checked = !allChecked);
        }

        function resetToHome() {
            if(confirm("האם אתה בטוח שברצונך לעזוב את המשחק הנוכחי ולחזור למסך הראשי?")) {
                location.reload();
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const temp = array[i];
                array[i] = array[j];
                array[j] = temp;
            }
        }

        function startGame() {
            const nameFields = document.querySelectorAll('.player-name-field');
            players = [];
            currentRoundCounter = 1; // איפוס המונה בתחילת משחק
            
            nameFields.forEach((field, index) => {
                const colorConfig = playerColors[index % playerColors.length];
                players.push({
                    id: index,
                    name: field.value.trim() || `שחקן ${index + 1}`,
                    money: 20,
                    roster: [],
                    isOutFromCurrentLot: false,
                    color: colorConfig
                });
            });
            
            const checkedTeams = Array.from(document.querySelectorAll('.team-cb'))
                                      .filter(cb => cb.checked)
                                      .map(cb => cb.value);

            const baseFiltered = loadedPlayers.filter(p => checkedTeams.includes(p.team));
            filteredPlayers = baseFiltered.map(p => ({ name: p.name, team: p.team }));

            const totalSlotsNeeded = players.length * 5;
            if (filteredPlayers.length < totalSlotsNeeded) {
                alert(`יש מעט מדי שחקנים בקבוצות שנבחרו! בשביל ${players.length} משתתפים צריך לפחות ${totalSlotsNeeded} שחקנים בסך הכל.`);
                return;
            }

            const selectedLeagueText = document.getElementById('leagueSelect').options[document.getElementById('leagueSelect').selectedIndex].text;
            document.getElementById('mainTitle').innerText = `🏆 ${selectedLeagueText}`;

            shuffleArray(filteredPlayers);
            
            const dashboard = document.getElementById('screenshotArea');
            dashboard.innerHTML = '';
            players.forEach(p => {
                dashboard.innerHTML += `
                    <div class="player-column" id="playerCol_${p.id}">
                        <span style="font-weight:bold; font-size:1.05rem; display: flex; align-items: center; gap: 6px;">
                            <span style="width: 10px; height: 10px; background-color: ${p.color.border}; border-radius: 50%; display: inline-block;"></span>
                            ${p.name}
                        </span>
                        <span class="budget" id="playerMoney_${p.id}">$20</span>
                        <ul class="roster-list" id="playerRoster_${p.id}"></ul>
                    </div>
                `;
            });

            currentLotItem = filteredPlayers.shift(); 
            
            gameState.currentBid = 1;
            gameState.isInitial = true;
            currentTurnIndex = 0;
            leadingBidderIndex = 0;

            document.getElementById('setupPanel').classList.add('hidden');
            document.getElementById('gamePanel').classList.remove('hidden');
            
            renderUI();
        }

        function handleAction(type) {
            if (type === 'bid') {
                const amount = parseInt(document.getElementById('bidRange').value);
                gameState.currentBid = amount;
                leadingBidderIndex = currentTurnIndex;
                gameState.isInitial = false;
                
                moveToNextTurn();
            } 
            else if (type === 'pass') {
                if (gameState.isInitial && currentTurnIndex === leadingBidderIndex) {
                    gameState.isInitial = false;
                    moveToNextTurn();
                } else {
                    players[currentTurnIndex].isOutFromCurrentLot = true;
                    
                    const activeInLot = players.filter(p => !p.isOutFromCurrentLot && p.roster.length < 5);
                    
                    if (activeInLot.length <= 1) {
                        const winner = players[leadingBidderIndex];
                        const cost = gameState.currentBid;
                        
                        // קנייה רגילה - שומר את מספר הסיבוב הנוכחי ומעלה את המונה
                        winner.money -= cost;
                        winner.roster.push({
                            round: currentRoundCounter,
                            text: `${currentLotItem.name} - ${currentLotItem.team} ($${cost})`
                        });
                        currentRoundCounter++;

                        currentLotItem = filteredPlayers.shift(); 
                        
                        checkAndHandleAutoFill();

                        gameState.currentBid = 1;
                        gameState.isInitial = true;
                        
                        players.forEach(p => p.isOutFromCurrentLot = false);
                        
                        let nextStarter = (leadingBidderIndex + 1) % players.length;
                        let loops = 0;
                        while(players[nextStarter].roster.length >= 5 && loops < players.length) {
                            nextStarter = (nextStarter + 1) % players.length;
                            loops++;
                        }
                        leadingBidderIndex = nextStarter;
                        currentTurnIndex = leadingBidderIndex;
                    } else {
                        moveToNextTurn();
                    }
                }
            }
            renderUI();
        }

        function moveToNextTurn() {
            let loops = 0;
            do {
                currentTurnIndex = (currentTurnIndex + 1) % players.length;
                loops++;
                if (loops > players.length * 2) break;
            } while (
                players[currentTurnIndex].isOutFromCurrentLot || 
                players[currentTurnIndex].roster.length >= 5
            );
        }

        function checkAndHandleAutoFill() {
            let incompletePlayers = players.filter(p => p.roster.length < 5);
            
            while (incompletePlayers.length === 1 && currentLotItem) {
                const remainingWinner = incompletePlayers[0];
                
                // מילוי אוטומטי - שומר את הסיבוב כ-(0) כפי שביקשת
                remainingWinner.roster.push({
                    round: 0,
                    text: `${currentLotItem.name} - ${currentLotItem.team} ($0)`
                });
                
                currentLotItem = filteredPlayers.shift(); 
                incompletePlayers = players.filter(p => p.roster.length < 5);
            }
        }

        function renderUI() {
            const allDone = players.every(p => p.roster.length >= 5);
            
            if (allDone || !currentLotItem) {
                document.getElementById('gamePanel').classList.add('hidden');
                document.getElementById('summaryPanel').classList.remove('hidden');
                
                players.forEach(p => {
                    document.getElementById(`playerMoney_${p.id}`).innerText = `$${p.money}`;
                    updateRosterList(`playerRoster_${p.id}`, p.roster);
                });

                const dashboard = document.getElementById('screenshotArea');
                document.querySelectorAll('.player-column').forEach(el => {
                    el.style.borderColor = 'transparent';
                    el.style.backgroundColor = 'rgba(255,255,255,0.02)';
                });
                document.getElementById('finalTeamsContainer').innerHTML = ''; 
                document.getElementById('finalTeamsContainer').appendChild(dashboard.cloneNode(true));
                return;
            }

            const currentPlayer = players[currentTurnIndex];

            const arenaEl = document.getElementById('gameArena');
            arenaEl.style.backgroundColor = currentPlayer.color.bg;
            arenaEl.style.borderColor = currentPlayer.color.border;

            players.forEach(p => {
                document.getElementById(`playerMoney_${p.id}`).innerText = `$${p.money}`;
                updateRosterList(`playerRoster_${p.id}`, p.roster);
                
                const col = document.getElementById(`playerCol_${p.id}`);
                
                if (p.id === currentTurnIndex) {
                    col.style.borderColor = p.color.border;
                    col.style.backgroundColor = p.color.bg;
                } else {
                    col.style.borderColor = 'transparent';
                    col.style.backgroundColor = 'rgba(255,255,255,0.02)';
                }
            });

            document.getElementById('currentLot').innerText = currentLotItem.name;
            document.getElementById('currentLotTeam').innerText = currentLotItem.team;

            document.getElementById('bidDisplay').innerText = `$${gameState.currentBid}`;
            document.getElementById('bidder').innerText = `(מוביל: ${players[leadingBidderIndex].name})`;
            document.getElementById('turnDisplay').innerText = `👉 תור: ${currentPlayer.name}`;

            const p = players[currentTurnIndex];
            const maxBid = p.money - (5 - p.roster.length - 1);
            const minBid = gameState.currentBid + 1;

            const slider = document.getElementById('bidRange');
            const submitBtn = document.getElementById('submitBidBtn');
            const passBtn = document.getElementById('passBtn');

            if (gameState.isInitial && currentTurnIndex === leadingBidderIndex) {
                passBtn.innerText = "פתח ב-$1";
                passBtn.className = "btn btn-continue";
            } else {
                passBtn.innerText = "ויתור ❌";
                passBtn.className = "btn btn-pass";
            }

            if (minBid > maxBid || p.roster.length >= 5) {
                slider.disabled = true;
                submitBtn.disabled = true;
                document.getElementById('sliderAmountDisplay').innerText = p.roster.length >= 5 ? "מלא" : "אין תקציב";
            } else {
                slider.disabled = false;
                submitBtn.disabled = false;
                slider.min = minBid;
                slider.max = maxBid;
                slider.value = minBid;
                document.getElementById('minRangeLabel').innerText = `$${minBid}`;
                document.getElementById('maxRangeLabel').innerText = `$${maxBid}`;
                document.getElementById('sliderAmountDisplay').innerText = `$${minBid}`;
            }
        }

        // כאן מתבצעת התצוגה של הפורמט החדש שביקשת
        function updateRosterList(id, arr) {
            const el = document.getElementById(id);
            el.innerHTML = '';
            for(let i = 1; i <= 5; i++) {
                const item = arr[i-1];
                if (item) {
                    // מדפיס בפורמט: (סיבוב) מספר. שם השחקן
                    el.innerHTML += `<li>(${item.round}) ${i}. ${item.text}</li>`;
                } else {
                    el.innerHTML += `<li>${i}. -</li>`;
                }
            }
        }

        async function shareScreenshot() {
            const targetElement = document.querySelector("#finalTeamsContainer .teams-dashboard");
            const shareBtn = document.getElementById('shareBtn');
            shareBtn.innerText = "מכין תמונה... ⏳";
            shareBtn.disabled = true;

            try {
                const canvas = await html2canvas(targetElement, {
                    backgroundColor: "#162447",
                    scale: 2 
                });

                canvas.toBlob(async (blob) => {
                    if (!blob) {
                        alert("שגיאה ביצירת התמונה");
                        return;
                    }
                    const file = new File([blob], "auction_results.png", { type: "image/png" });

                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            files: [file],
                            title: 'תוצאות מכירה פומבית',
                            text: 'קבלו את תוצאות המכירה הפומבית של הליגה!'
                        });
                    } else {
                        const link = document.createElement('a');
                        link.download = 'auction_results.png';
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                        alert("הדפדפן שלך לא תומך בשיתוף ישיר. התמונה הורדה למכשיר שלך, כעת תוכל לשלוח אותה ידנית!");
                    }
                    shareBtn.innerText = "📸 שתף צילום מסך";
                    shareBtn.disabled = false;
                }, 'image/png');

            } catch (err) {
                console.error("שגיאה בשיתוף התמונה:", err);
                alert("קרתה שגיאה במהלך יצירת התמונה.");
                shareBtn.innerText = "📸 שתף צילום מסך";
