<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מכירה פומבית - ליגות חכמות</title>
    <style>
        :root {
            --bg-color: #1a1a2e; --card-bg: #162447; --accent-color: #00d2fc;
            --text-color: #ffffff; --muted-text: #b0b0b0; --success-color: #4cd137; --danger-color: #e84118;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { width: 100%; max-width: 600px; text-align: center; margin-bottom: 20px; }
        h1 { color: var(--accent-color); font-size: 1.8rem; }
        .container { width: 100%; max-width: 600px; }
        .panel { background-color: var(--card-bg); border-radius: 12px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); margin-bottom: 20px; }
        h2 { margin-bottom: 15px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; font-size: 1.2rem; }
        .setup-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .name-input, select { width: 100%; background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 6px; color: white; font-size: 1rem; outline: none; }
        select option { background: var(--card-bg); color: white; }
        .btn { background-color: var(--accent-color); color: #000; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; width: 100%; margin-bottom: 10px; }
        .btn:disabled { background-color: #555 !important; color: #aaa !important; }

        .setup-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .setup-header-row h2 { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .gear-btn { background: rgba(255,255,255,0.08); color: var(--accent-color); border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 0.95rem; font-weight: bold; width: auto; }

        .settings-panel { background: rgba(0,0,0,0.25); border: 1px dashed rgba(255,255,255,0.15); border-radius: 10px; padding: 15px; margin-bottom: 20px; }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .settings-grid label { display: flex; flex-direction: column; gap: 6px; font-size: 0.82rem; color: var(--muted-text); }
        .settings-grid input { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 6px; color: white; font-size: 1rem; }

        .league-slot { background: rgba(255,255,255,0.03) !important; box-shadow: none !important; border: 1px solid rgba(255,255,255,0.06); padding: 15px !important; }
        .league-slot h2 { font-size: 1rem; margin-bottom: 10px; }

        .teams-toggle-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px; }
        .team-item { display: flex; align-items: center; gap: 8px; font-size: 0.95rem; cursor: pointer; }
        .team-item input { width: 18px; height: 18px; accent-color: var(--accent-color); }
        .toggle-all-btn { background: none; border: none; color: var(--accent-color); cursor: pointer; text-decoration: underline; font-size: 0.9rem; text-align: right; margin-bottom: 5px; }

        .arena { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 20px; text-align: center; border: 1px dashed rgba(255,255,255,0.2); margin-bottom: 20px; display: flex; flex-direction: column; transition: background-color 0.4s ease, border-color 0.4s ease; }
        .turn-indicator { font-size: 1.2rem; font-weight: bold; color: #f1c40f; margin-bottom: 15px; background: rgba(241, 196, 15, 0.1); padding: 8px 15px; border-radius: 6px; display: inline-block; align-self: center; }
        .lot-name { font-size: 2rem; color: #ffffff; font-weight: bold; margin-bottom: 2px; }
        .lot-team { font-size: 0.95rem; color: var(--accent-color); margin-bottom: 20px; }
        .bid-slider-container { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin: 20px 0; }
        .slider-row { display: flex; align-items: center; gap: 10px; }
        .range-slider { flex-grow: 1; accent-color: var(--accent-color); }
        .slider-val { font-size: 1.4rem; font-weight: bold; color: var(--success-color); min-width: 60px; }
        .action-btns { display: flex; gap: 12px; }
        .btn-pass { background-color: var(--danger-color); color: white; }
        .btn-continue { background-color: var(--success-color); color: white; }

        .teams-dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; background: rgba(0, 0, 0, 0.15); padding: 15px; border-radius: 12px; }
        .player-column { display: flex; flex-direction: column; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; text-align: right; border: 2px solid transparent; transition: all 0.4s ease; }
        .budget { color: var(--success-color); font-weight: bold; font-size: 1.1rem; margin-bottom: 8px; }
        .roster-list { list-style: none; }
        .roster-list li { font-size: 0.82rem; padding: 6px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); color: var(--muted-text); word-break: break-all; }
        .summary-layout { text-align: center; background: var(--card-bg); border-radius: 16px; padding: 30px; border: 2px solid var(--accent-color); }
        .hidden { display: none !important; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

    <header>
        <h1 id="mainTitle">🏀מכירה פומבית - שחקנים🏀</h1>
    </header>

    <div class="container">

        <div class="panel" id="modeSelectPanel">
            <h2>איך רוצים לשחק?</h2>
            <button class="btn" onclick="chooseLocalMode()">📱 מקומי (מעבירים מכשיר אחד)</button>
            <button class="btn" style="background-color:#00b894;" onclick="chooseOnlineMode()">🌐 מקוון (כל אחד מהמכשיר שלו)</button>
        </div>

        <div class="panel hidden" id="onlineChoicePanel">
            <h2>משחק מקוון</h2>
            <button class="btn" onclick="chooseCreateRoom()">➕ צור חדר חדש</button>
            <button class="btn" onclick="chooseJoinRoom()">🔑 הצטרף לחדר עם קוד</button>
            <button class="btn" onclick="location.reload()">⬅ חזרה</button>
        </div>

        <div class="panel hidden" id="joinRoomPanel">
            <h2>הצטרפות לחדר</h2>
            <div class="setup-row">
                <input type="text" class="name-input" id="joinRoomCodeInput" maxlength="6" placeholder="קוד החדר (למשל: AB3XZ)" style="text-align:center; font-size:1.3rem; letter-spacing:3px;">
            </div>
            <button class="btn" onclick="joinRoomSubmit()">הצטרף 🚪</button>
            <button class="btn" onclick="location.reload()">⬅ חזרה</button>
        </div>

        <div class="panel hidden" id="roomLobbyPanel">
            <h2>לובי - ממתינים לשחקנים</h2>
            <div style="text-align:center; margin-bottom:15px;">
                <div style="color: var(--muted-text); font-size:0.9rem;">קוד החדר לשיתוף עם חברים:</div>
                <div id="roomCodeDisplay" style="font-size:2rem; font-weight:bold; color: var(--accent-color); letter-spacing:4px;">-----</div>
                <button class="btn" id="shareRoomBtn" onclick="shareRoomLink()" style="margin-top:10px;">🔗 שתף קישור לחדר</button>
            </div>
            <div id="roomSeatsContainer" style="display:flex; flex-direction:column; gap:10px; margin-bottom:15px;"></div>
            <button class="btn hidden" id="hostStartBtn" onclick="hostStartOnlineGame()">התחל משחק 🚀</button>
            <button class="btn" onclick="leaveLobby()">⬅ עזוב</button>
        </div>

        <div class="panel hidden" id="setupPanel">
            <button class="btn" onclick="if(confirm('לחזור להתחלה?')) location.reload();">⬅ חזרה להתחלה</button>
            <div class="setup-header-row">
                <h2>הגדרת המשחק</h2>
                <button class="gear-btn" onclick="toggleSettingsPanel()">⚙️ הגדרות</button>
            </div>

            <div class="settings-panel hidden" id="settingsPanel">
                <div class="settings-grid">
                    <label id="numPlayersSettingRow">מספר משתתפים (2-10)
                        <input type="number" id="setNumPlayers" min="2" max="10" value="2">
                    </label>
                    <label>תקציב לכל שחקן ($5-$100)
                        <input type="number" id="setBudget" min="5" max="100" value="20">
                    </label>
                    <label>גודל סגל (5-12)
                        <input type="number" id="setTeamSize" min="5" max="12" value="5">
                    </label>
                    <label><span>מספר ליגות (1-<span id="maxLeaguesHint">1</span>)</span>
                        <input type="number" id="setNumLeagues" min="1" max="1" value="1">
                    </label>
                </div>
                <button class="btn" onclick="applySettings()">שמור הגדרות ✅</button>
            </div>

            <h2 id="playerNamesHeading">שמות השחקנים</h2>
            <div class="setup-row" id="playerNamesContainer"></div>

            <h2>ליגות וקבוצות</h2>
            <div id="leagueSlotsContainer"></div>

            <button class="btn" id="startBtn">גמרנו, התחל משחק! 🚀</button>
        </div>

        <div class="game-layout hidden" id="gamePanel">
            <button class="btn" onclick="resetToHome()">🏠 חזרה לעמוד הראשי</button>

            <div class="arena" id="gameArena">
                <div class="turn-indicator" id="turnDisplay">-</div>
                <div id="turnTimerDisplay" style="font-size: 1.5rem; font-weight: bold; color: var(--muted-text); margin-bottom: 10px;"></div>
                <div class="lot-name" id="currentLot">-</div>
                <div class="lot-team" id="currentLotTeam">-</div>

                <div style="margin: 15px 0; font-size: 1.1rem;">
                    הצעה מובילה: <strong id="bidDisplay" style="color: var(--accent-color); font-size: 1.4rem;">$1</strong>
                    <span id="bidder" style="color: var(--muted-text);">(מוביל: -)</span>
                </div>

                <div class="bid-slider-container" id="bidSliderContainer">
                    <div class="slider-row">
                        <span id="minRangeLabel">$2</span>
                        <input type="range" id="bidRange" class="range-slider" min="2" max="20" value="2" oninput="document.getElementById('sliderAmountDisplay').innerText = '$'+this.value">
                        <span id="maxRangeLabel">$20</span>
                        <div class="slider-val" id="sliderAmountDisplay">$2</div>
                    </div>
                </div>

                <div class="action-btns" id="normalActionBtns">
                    <button class="btn" id="submitBidBtn" onclick="handleAction('bid')">אישור הצעה</button>
                    <button class="btn btn-pass" id="passBtn" onclick="handleAction('pass')">ויתור</button>
                </div>

                <button class="btn btn-continue hidden" id="autoFillActionBtn" onclick="confirmAutoFillPick()">אישור, הבא ⏭️</button>
                <button class="btn hidden" id="hostSkipBtn" onclick="hostForceSkip()" style="background-color:#7f8c8d; color:white;">⏭️ דלג על התור (מארח)</button>
            </div>

            <div class="teams-dashboard" id="screenshotArea"></div>
        </div>

        <div class="summary-layout hidden" id="summaryPanel">
            <h2>🏁 המכירה הפומבית הסתיימה!</h2>
            <div style="margin: 10px 0; font-size: 1.1rem; color: var(--muted-text)">אלו הסגלים הסופיים שלכם:</div>

            <div id="finalTeamsContainer" style="margin-bottom: 25px; margin-top: 20px;"></div>

            <button class="btn" id="shareBtn" onclick="shareScreenshot()" style="background-color: var(--success-color); color: black;">📸 שתף צילום מסך</button>

            <div id="readyCheckContainer" class="hidden" style="text-align:right; margin-bottom:15px;"></div>
            <button class="btn hidden" id="readyBtn" onclick="markMyselfReady()" style="background-color: var(--success-color); color: black;">מוכן לסיבוב הבא ✅</button>

            <button class="btn" id="newRoundBtn" onclick="startNewRound()">סיבוב חדש 🔄</button>
            <div id="waitingForHostNote" class="hidden" style="color: var(--muted-text); font-size: 0.9rem; margin-bottom: 10px;">ממתינים למארח שיתחיל סיבוב חדש...</div>
            <button class="btn" onclick="leaveToMainMenu()">🏠 יציאה לתפריט הראשי</button>
        </div>

    </div>

    <script>
        // ---------- Persistence keys ----------
        const LS_LOBBY = 'auction_lobby_v1';       // player names, settings, league/team selections (kept between games)
        const LS_GAME  = 'auction_game_v1';         // full mid-game snapshot for LOCAL mode only
        const LS_LAST_ROOM = 'auction_last_room_v1'; // last online room code, for a quick "rejoin" shortcut

        // ---------- Settings ----------
        const DEFAULT_SETTINGS = { numPlayers: 2, budget: 20, teamSize: 5, numLeagues: 1 };
        let settings = { ...DEFAULT_SETTINGS };

        // Online rooms don't use settings.numPlayers at all - anyone can join up to this cap,
        // and the host starts whenever they're ready with however many have actually joined.
        const MAX_ONLINE_SEATS = 10;

        // Ordered so that any two consecutive players (by turn order) are 108° apart on the
        // color wheel - the maximum possible even spacing for a 10-color rotating palette.
        // This guarantees player N and player N+1 never look like shades of the same color.
        const PLAYER_COLORS = [
            { bg: "rgba(194, 46, 46, 0.24)",   border: "#c22e2e" },  // red
            { bg: "rgba(75, 194, 46, 0.24)",   border: "#4bc22e" },  // green
            { bg: "rgba(46, 105, 194, 0.24)",  border: "#2e69c2" },  // blue
            { bg: "rgba(194, 46, 135, 0.24)",  border: "#c22e87" },  // magenta
            { bg: "rgba(164, 194, 46, 0.24)",  border: "#a4c22e" },  // chartreuse
            { bg: "rgba(46, 194, 194, 0.24)",  border: "#2ec2c2" },  // cyan
            { bg: "rgba(164, 46, 194, 0.24)",  border: "#a42ec2" },  // purple
            { bg: "rgba(194, 135, 46, 0.24)",  border: "#c2872e" },  // orange
            { bg: "rgba(46, 194, 105, 0.24)",  border: "#2ec269" },  // teal-green
            { bg: "rgba(75, 46, 194, 0.24)",   border: "#4b2ec2" }   // indigo
        ];

        // ---------- League data ----------
        let availableLeagueFiles = [];   // ["PT_26.json", "GS_26.json", ...]
        let leagueDataCache = {};        // fileName -> raw parsed JSON array
        let leagueSlots = [];            // [{ file, checkedTeams: [team,...] | null }]

        // ---------- Game state ----------
        let players = [];
        let currentTurnIndex = 0;
        let leadingBidderIndex = 0;
        let roundStarterIndex = 0;
        let currentLotItem = null;
        let currentRoundCounter = 1;
        let filteredPlayers = [];
        let autoFillState = { active: false, playerId: null };

        let gameState = {
            currentBid: 1,
            isInitial: true
        };

        // ---------- Turn timer: 30s per bidding turn, auto-acts if nobody responds in time ----------
        const TURN_TIME_LIMIT_MS = 30000;
        let turnTimerHandle = null;
        let turnTimerDeadline = null;
        let turnTimerSignature = null;

        // ---------- Auto-fill timer: 5s per step, auto-confirms the free player if nobody
        // clicks in time - same deterministic-action reasoning as the bidding timer above, just
        // a shorter window since there's no actual decision being made, only a confirmation.
        const AUTO_FILL_TIME_LIMIT_MS = 5000;
        let autoFillTimerHandle = null;
        let autoFillTimerDeadline = null;
        let autoFillTimerSignature = null;

        // ---------- Online mode state ----------
        // Loaded at boot from config.json (a separate file, kept out of index.html) so that
        // regenerating/updating this file never overwrites your actual project credentials.
        // See README.md for the config.json format and how to set up the Supabase project.
        let SUPABASE_CONFIG = { url: "", anonKey: "" };

        async function loadSupabaseConfig() {
            try {
                const res = await fetch('config.json');
                if (res.ok) {
                    const cfg = await res.json();
                    SUPABASE_CONFIG.url = cfg.url || "";
                    SUPABASE_CONFIG.anonKey = cfg.anonKey || "";
                }
            } catch (err) {
                console.error("לא ניתן לטעון config.json - מצב מקוון לא יהיה זמין עד שהקובץ יוגדר", err);
            }
        }

        let isOnline = false;
        let roomCode = null;
        let myUid = null;
        let mySeatIndex = null;
        let amIHost = false;
        let sbClient = null;
        let roomChannel = null;

        // Kept up to date from every realtime payload (lobby column) so ready-check/kick UI
        // and "was I kicked?" detection always have a fresh view of who's actually still seated,
        // even after the game has started and the lobby screen itself is long gone.
        let currentLobby = null;
        // uids who've clicked "ready" for the next round (part of shared state, reset each round)
        let readyUids = [];
        // set right before I voluntarily clear my own seat, so my own realtime echo of that
        // change doesn't make my own client think the HOST kicked me
        let iAmLeavingVoluntarily = false;

        function isSupabaseConfigured() {
            return !!SUPABASE_CONFIG.url && !!SUPABASE_CONFIG.anonKey &&
                   !SUPABASE_CONFIG.url.includes('YOUR_') && !SUPABASE_CONFIG.anonKey.includes('YOUR_');
        }

        async function ensureSupabaseAuth() {
            if (!isSupabaseConfigured()) {
                alert("כדי לשחק מקוון צריך קודם להגדיר פרויקט Supabase (ראו README.md).");
                throw new Error("Supabase not configured");
            }
            if (!sbClient) {
                sbClient = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
            }
            if (!myUid) {
                const { data, error } = await sbClient.auth.signInAnonymously();
                if (error) {
                    alert("שגיאה בהתחברות האנונימית: " + error.message);
                    throw error;
                }
                myUid = data.user.id;
            }
            return myUid;
        }

        // ---------- Boot ----------
        window.onload = async function() {
            await loadSupabaseConfig();

            const roomFromUrl = new URLSearchParams(window.location.search).get('room');
            if (roomFromUrl) {
                // Someone opened a shared room link - skip straight to joining that room,
                // no need to go through the mode-select / "enter code" screens at all.
                document.getElementById('modeSelectPanel').classList.add('hidden');
                attemptJoinRoom(roomFromUrl.toUpperCase().trim());
                return;
            }

            if (isSupabaseConfigured()) {
                ensureSupabaseAuth().catch(() => {}); // warm up in the background; errors surface later if actually needed
            }
        };

        async function shareRoomLink() {
            const url = new URL(window.location.href);
            url.search = '';
            url.searchParams.set('room', roomCode);
            const shareUrl = url.toString();

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'הצטרפו למכירה הפומבית שלי!',
                        text: `הצטרפו למשחק - קוד החדר: ${roomCode}`,
                        url: shareUrl
                    });
                } catch (err) {
                    // Share sheet cancelled/dismissed by the user - not an error worth surfacing.
                    console.log('השיתוף בוטל', err);
                }
                return;
            }

            try {
                await navigator.clipboard.writeText(shareUrl);
                alert(`הקישור הועתק! שלחו אותו לחברים:\n${shareUrl}`);
            } catch (err) {
                prompt('העתיקו את הקישור הזה ושלחו לחברים:', shareUrl);
            }
        }

        async function loadLeagueFilesAndShowSetup() {
            try {
                const indexResponse = await fetch('Leagues.json');
                if (!indexResponse.ok) throw new Error("קובץ Leagues.json לא נמצא.");
                availableLeagueFiles = await indexResponse.json();
            } catch (err) {
                alert("שגיאה קריטית: ודא שקיים קובץ בשם 'Leagues.json' באותה התיקייה בדיוק.");
                console.error(err);
                return;
            }

            for (const fileName of availableLeagueFiles) {
                try {
                    const response = await fetch(fileName);
                    if (!response.ok) continue;
                    leagueDataCache[fileName] = await response.json();
                } catch (err) {
                    console.error(`שגיאה בטעינת קובץ: ${fileName}`, err);
                }
            }

            loadLobbyFromStorage();
            renderSettingsInputs();
            renderPlayerNameInputs();
            renderLeagueSlots();

            document.getElementById('playerNamesHeading').innerText = isOnline ? 'השם שלך' : 'שמות השחקנים';
            document.getElementById('numPlayersSettingRow').classList.toggle('hidden', isOnline);

            const startBtn = document.getElementById('startBtn');
            startBtn.innerText = isOnline ? "צור חדר מקוון 🌐" : "גמרנו, התחל משחק! 🚀";
            startBtn.onclick = isOnline ? createOnlineRoom : startGame;

            document.getElementById('setupPanel').classList.remove('hidden');
        }

        // ---------- Mode selection ----------
        async function chooseLocalMode() {
            isOnline = false;
            document.getElementById('modeSelectPanel').classList.add('hidden');

            const savedGame = localStorage.getItem(LS_GAME);
            if (savedGame) {
                try {
                    const snapshot = JSON.parse(savedGame);
                    if (confirm("נמצא משחק פעיל שלא הסתיים. לשחזר אותו ולהמשיך מאיפה שעצרתם?")) {
                        restoreGameState(snapshot);
                        return;
                    } else {
                        localStorage.removeItem(LS_GAME);
                    }
                } catch (err) {
                    console.error("שגיאה בשחזור המשחק השמור", err);
                    localStorage.removeItem(LS_GAME);
                }
            }

            await loadLeagueFilesAndShowSetup();
        }

        function chooseOnlineMode() {
            document.getElementById('modeSelectPanel').classList.add('hidden');
            document.getElementById('onlineChoicePanel').classList.remove('hidden');
        }

        async function chooseCreateRoom() {
            try { await ensureSupabaseAuth(); } catch (e) { return; }
            isOnline = true;
            document.getElementById('onlineChoicePanel').classList.add('hidden');
            await loadLeagueFilesAndShowSetup();
        }

        function chooseJoinRoom() {
            document.getElementById('onlineChoicePanel').classList.add('hidden');
            document.getElementById('joinRoomPanel').classList.remove('hidden');
        }

        function joinRoomSubmit() {
            const code = document.getElementById('joinRoomCodeInput').value.trim().toUpperCase();
            if (!code) { alert("צריך להזין קוד חדר."); return; }
            attemptJoinRoom(code);
        }

        async function attemptJoinRoom(code) {
            try { await ensureSupabaseAuth(); } catch (e) { return; }
            isOnline = true;

            const { data, error } = await sbClient.from('rooms').select('lobby, state').eq('room_code', code).maybeSingle();
            if (error || !data) {
                alert("לא נמצא חדר עם הקוד הזה. בדקו שהקוד נכון.");
                return;
            }

            // The room locks the moment a game has started, for its entire lifetime (including
            // future "New Round"s) - the only way back in is if you were already part of that
            // game (a genuine reconnect, e.g. after a refresh), matched by uid.
            if (data.state) {
                const alreadyIn = (data.state.players || []).some(p => p.uid === myUid);
                if (!alreadyIn) {
                    alert("המשחק בחדר הזה כבר התחיל - החדר נעול ואי אפשר להצטרף אליו.");
                    return;
                }
            }

            roomCode = code;
            localStorage.setItem(LS_LAST_ROOM, roomCode);
            document.getElementById('joinRoomPanel').classList.add('hidden');

            const lobby = data.lobby;
            currentLobby = lobby;
            const existingSeatIndex = (lobby.seats || []).findIndex(s => s && s.uid === myUid);
            mySeatIndex = existingSeatIndex >= 0 ? existingSeatIndex : null;
            amIHost = lobby.hostUid === myUid;

            await enterRoomLobby(amIHost);
        }

        // ---------- Hosting an online room ----------
        function generateRoomCode() {
            const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789'; // no 0/O or 1/I - easy to read aloud
            let code = '';
            for (let i = 0; i < 5; i++) code += chars[Math.floor(Math.random() * chars.length)];
            return code;
        }

        async function createOnlineRoom() {
            const nameFields = document.querySelectorAll('.player-name-field');
            const hostName = (nameFields[0] && nameFields[0].value.trim()) || 'שחקן 1';

            const resolvedSlots = leagueSlots.map((slot, i) => ({
                file: slot.file,
                checkedTeams: Array.from(document.querySelectorAll(`.team-cb[data-slot="${i}"]`))
                                    .filter(cb => cb.checked).map(cb => cb.value)
            }));

            const seenGlobal = new Set();
            let pool = [];
            resolvedSlots.forEach(slot => {
                if (!slot.file) return;
                getPlayersForFile(slot.file).filter(p => slot.checkedTeams.includes(p.team)).forEach(p => {
                    const key = `${slot.file}_${p.name}_${p.team}`;
                    if (!seenGlobal.has(key)) { seenGlobal.add(key); pool.push(p); }
                });
            });
            // Online rooms don't have a fixed player count up front - people just join - so this
            // is only a sanity check against the smallest possible game (2 players). The real
            // check against however many actually joined happens again when the host starts.
            const minSlotsNeeded = 2 * settings.teamSize;
            if (pool.length < minSlotsNeeded) {
                alert(`יש מעט מדי שחקנים בקבוצות שנבחרו! גם בשביל 2 משתתפים בלבד (${settings.teamSize} בסגל כל אחד) צריך לפחות ${minSlotsNeeded} שחקנים, ויש רק ${pool.length}.`);
                return;
            }

            try { await ensureSupabaseAuth(); } catch (e) { return; }

            roomCode = generateRoomCode();
            localStorage.setItem(LS_LAST_ROOM, roomCode);

            const seats = [];
            for (let i = 0; i < MAX_ONLINE_SEATS; i++) seats.push({ name: '', uid: null });
            seats[0] = { name: hostName, uid: myUid };

            const { error } = await sbClient.from('rooms').insert({
                room_code: roomCode,
                lobby: {
                    hostUid: myUid,
                    settings: { ...settings },
                    leagueSlots: resolvedSlots,
                    seats,
                    createdAt: Date.now()
                }
            });
            if (error) {
                alert("שגיאה ביצירת החדר: " + error.message);
                console.error(error);
                return;
            }

            saveLobbyToStorage();
            mySeatIndex = 0;
            amIHost = true;

            document.getElementById('setupPanel').classList.add('hidden');
            await enterRoomLobby(true);
        }

        // A single realtime subscription per room covers both the lobby (seat claims) and the
        // game state (bids/passes) - both live as columns on the same "rooms" row, so any UPDATE
        // to that row delivers whichever part changed.
        async function enterRoomLobby(isHost) {
            document.getElementById('roomLobbyPanel').classList.remove('hidden');
            document.getElementById('roomCodeDisplay').innerText = roomCode;
            document.getElementById('hostStartBtn').classList.toggle('hidden', !isHost);

            const { data } = await sbClient.from('rooms').select('lobby, state').eq('room_code', roomCode).maybeSingle();
            if (data) {
                currentLobby = data.lobby || currentLobby;
                if (data.state) { applyRemoteState(data.state); return; }
                if (data.lobby) renderRoomLobbySeats(data.lobby, isHost);
            }

            roomChannel = sbClient
                .channel(`room-${roomCode}`)
                .on('postgres_changes', { event: '*', schema: 'public', table: 'rooms', filter: `room_code=eq.${roomCode}` }, (payload) => {
                    if (payload.eventType === 'DELETE') {
                        handleRoomClosedByHost();
                        return;
                    }
                    const row = payload.new;
                    if (!row) return;

                    currentLobby = row.lobby || currentLobby;

                    // If my uid no longer appears anywhere in the seats, someone (the host)
                    // cleared my seat out from under me - unless I'm the one who just left
                    // voluntarily, in which case this is just my own change echoing back.
                    if (!iAmLeavingVoluntarily && !amIHost && mySeatIndex !== null && row.lobby && row.lobby.seats) {
                        const stillSeated = row.lobby.seats.some(s => s && s.uid === myUid);
                        if (!stillSeated) { handleKickedByHost(); return; }
                    }

                    if (row.state) {
                        document.getElementById('roomLobbyPanel').classList.add('hidden');
                        applyRemoteState(row.state);
                    } else if (row.lobby) {
                        renderRoomLobbySeats(row.lobby, isHost);
                    }
                })
                .subscribe();
        }

        function handleRoomClosedByHost() {
            if (roomChannel) { sbClient.removeChannel(roomChannel); roomChannel = null; }
            localStorage.removeItem(LS_LAST_ROOM);
            alert("המארח עזב את החדר - המשחק הסתיים.");
            location.reload();
        }

        function handleKickedByHost() {
            if (roomChannel) { sbClient.removeChannel(roomChannel); roomChannel = null; }
            localStorage.removeItem(LS_LAST_ROOM);
            alert("המארח הוציא אותך מהחדר.");
            location.reload();
        }

        // Host closing the room entirely - used whenever the host leaves, from any screen.
        async function closeRoomAsHost() {
            try {
                await sbClient.from('rooms').delete().eq('room_code', roomCode);
            } catch (err) {
                console.error("שגיאה בסגירת החדר", err);
            }
            if (roomChannel) { sbClient.removeChannel(roomChannel); roomChannel = null; }
            localStorage.removeItem(LS_LAST_ROOM);
            location.reload();
        }

        function renderRoomLobbySeats(lobby, isHost) {
            currentLobby = lobby;
            const seats = lobby.seats || [];
            const container = document.getElementById('roomSeatsContainer');
            const claimedSeats = seats.filter(s => s && s.uid);

            let html = claimedSeats.map(seat => {
                const isMe = seat.uid === myUid;
                const kickBtn = (isHost && !isMe)
                    ? `<button onclick="hostKickPlayer('${seat.uid}')" style="background:var(--danger-color); color:white; border:none; border-radius:4px; padding:4px 9px; font-size:0.8rem; cursor:pointer;">✕</button>`
                    : '';
                return `<div class="team-item" style="justify-content:space-between; background:rgba(0,0,0,0.15); padding:10px; border-radius:6px;">
                            <span>${escapeHtml(seat.name)} ${isMe ? '(אתה)' : ''}</span>
                            <span style="display:flex; align-items:center; gap:8px;">✅ ${kickBtn}</span>
                        </div>`;
            }).join('');

            if (mySeatIndex === null) {
                if (claimedSeats.length < seats.length) {
                    html += `<div style="display:flex; flex-direction:column; gap:6px; background:rgba(0,0,0,0.15); padding:10px; border-radius:6px; margin-top:10px;">
                                <input type="text" class="name-input" id="joinSeatNameInput" maxlength="12" placeholder="השם שלך">
                                <button class="btn btn-continue" style="margin-bottom:0;" onclick="joinOpenSeat()">הצטרף למשחק!</button>
                             </div>`;
                } else {
                    html += `<div class="team-item" style="background:rgba(0,0,0,0.1); padding:10px; border-radius:6px; margin-top:10px;"><span style="color:var(--muted-text);">החדר מלא (${seats.length} שחקנים)</span></div>`;
                }
            }

            container.innerHTML = html;

            if (isHost) {
                const startBtn = document.getElementById('hostStartBtn');
                const enoughPlayers = claimedSeats.length >= 2;
                startBtn.disabled = !enoughPlayers;
                startBtn.innerText = enoughPlayers
                    ? `התחל משחק 🚀 (${claimedSeats.length} שחקנים)`
                    : `צריך לפחות 2 שחקנים (יש ${claimedSeats.length})`;
            }
        }

        // Anyone can join any still-open seat (no fixed player count). Retries against the next
        // open seat if two people happen to grab the same one at nearly the same instant - the
        // atomic claim_seat function guarantees only one of them actually succeeds per seat.
        async function joinOpenSeat() {
            const input = document.getElementById('joinSeatNameInput');
            const name = (input.value || '').trim();
            if (!name) { alert("צריך להזין שם."); return; }

            for (let attempt = 0; attempt < MAX_ONLINE_SEATS + 2; attempt++) {
                const { data } = await sbClient.from('rooms').select('lobby').eq('room_code', roomCode).maybeSingle();
                const seats = (data && data.lobby && data.lobby.seats) || [];
                const openIndex = seats.findIndex(s => !s || !s.uid);
                if (openIndex === -1) {
                    alert("החדר מלא, אין יותר מקומות פנויים.");
                    return;
                }

                const { data: claimed } = await sbClient.rpc('claim_seat', {
                    p_room_code: roomCode, p_seat_index: openIndex, p_name: name, p_uid: myUid
                });

                if (claimed) {
                    mySeatIndex = openIndex;
                    return;
                }
                // someone else grabbed that exact seat a moment ago - loop and try the next open one
            }
            alert("לא הצלחנו למצוא מקום פנוי כרגע, נסו שוב.");
        }

        // Leaving the lobby BEFORE a game has started: the host closes the whole room (nobody
        // else can be left waiting in a dead lobby); anyone else just frees their own seat via
        // an atomic RPC (safe against a concurrent joinOpenSeat - see leave_seat in the SQL
        // setup: it only clears a seat if it's still yours, exactly mirroring claim_seat's
        // "only if still empty" guarantee, so the two can never step on each other).
        async function leaveLobby() {
            if (!confirm('לעזוב את הלובי?')) return;

            if (amIHost) {
                await closeRoomAsHost();
                return;
            }

            if (mySeatIndex !== null) {
                iAmLeavingVoluntarily = true;
                try {
                    const { error } = await sbClient.rpc('leave_seat', { p_room_code: roomCode, p_seat_index: mySeatIndex, p_uid: myUid });
                    if (error) console.error("שגיאה בעזיבת המקום", error);
                } catch (err) {
                    console.error("שגיאה בעזיבת המקום", err);
                }
            }
            localStorage.removeItem(LS_LAST_ROOM);
            location.reload();
        }

        // Host-only: remove someone else's seat, whether that's during the lobby (before the
        // game starts) or during the post-game ready-check (before the next round starts).
        // Uses the same atomic host_kick_seat RPC either way - it only touches lobby.seats,
        // which is exactly what the next "New Round"/game start reads from.
        async function hostKickPlayer(uid) {
            if (!amIHost) return;
            if (!confirm("להוציא את השחקן הזה מהחדר?")) return;

            const seatIdx = ((currentLobby && currentLobby.seats) || []).findIndex(s => s && s.uid === uid);
            if (seatIdx === -1) return;

            try {
                const { data: kicked, error } = await sbClient.rpc('host_kick_seat', { p_room_code: roomCode, p_seat_index: seatIdx, p_host_uid: myUid });
                if (error) {
                    console.error("שגיאה בהוצאת שחקן", error);
                    alert("לא הצלחנו להוציא את השחקן: " + error.message);
                } else if (!kicked) {
                    alert("לא הצלחנו להוציא את השחקן (ייתכן שהוא כבר לא בחדר).");
                }
            } catch (err) {
                console.error("שגיאה בהוצאת שחקן", err);
                alert("שגיאה בהוצאת השחקן.");
            }
        }

        async function hostStartOnlineGame() {
            const { data } = await sbClient.from('rooms').select('lobby').eq('room_code', roomCode).maybeSingle();
            const lobby = data && data.lobby;
            if (!lobby) return;
            const claimedSeats = (lobby.seats || []).filter(s => s && s.uid);
            if (claimedSeats.length < 2) {
                alert("צריך לפחות 2 שחקנים כדי להתחיל את המשחק.");
                return;
            }

            settings = { ...DEFAULT_SETTINGS, ...lobby.settings };

            const seenGlobal = new Set();
            filteredPlayers = [];
            (lobby.leagueSlots || []).forEach(slot => {
                if (!slot.file) return;
                getPlayersForFile(slot.file).filter(p => (slot.checkedTeams || []).includes(p.team)).forEach(p => {
                    const key = `${slot.file}_${p.name}_${p.team}`;
                    if (!seenGlobal.has(key)) { seenGlobal.add(key); filteredPlayers.push({ name: p.name, team: p.team }); }
                });
            });

            const totalSlotsNeeded = claimedSeats.length * settings.teamSize;
            if (filteredPlayers.length < totalSlotsNeeded) {
                alert(`יש מעט מדי שחקנים בקבוצות שנבחרו! בשביל ${claimedSeats.length} משתתפים (${settings.teamSize} בסגל כל אחד) צריך לפחות ${totalSlotsNeeded} שחקנים, ויש רק ${filteredPlayers.length}.`);
                return;
            }

            players = claimedSeats.map((seat, index) => ({
                id: index,
                name: seat.name,
                uid: seat.uid,
                money: settings.budget,
                roster: [],
                isOutFromCurrentLot: false,
                color: PLAYER_COLORS[index % PLAYER_COLORS.length]
            }));

            shuffleArray(filteredPlayers);
            currentLotItem = filteredPlayers.shift();
            gameState = { currentBid: 1, isInitial: true };
            // A random starting player every game/round, not always seat 0.
            const startIndex = Math.floor(Math.random() * players.length);
            roundStarterIndex = startIndex;
            currentTurnIndex = startIndex;
            leadingBidderIndex = startIndex;
            currentRoundCounter = 1;
            autoFillState = { active: false, playerId: null };
            readyUids = []; // nobody's "ready for next round" yet - this IS the next round starting

            const leagueNames = (lobby.leagueSlots || []).filter(s => s.file).map(s => getLeagueDisplayName(s.file));
            const title = `🏀 ${leagueNames.join(' + ')}`;
            document.getElementById('mainTitle').innerText = title;

            await pushOnlineState(title);
        }

        function buildStateSnapshot(titleOverride) {
            return {
                settings, players, currentTurnIndex, leadingBidderIndex, roundStarterIndex,
                currentLotItem, currentRoundCounter, filteredPlayers, gameState, autoFillState,
                readyUids,
                mainTitle: titleOverride || document.getElementById('mainTitle').innerText
            };
        }

        async function pushOnlineState(titleOverride) {
            const { error } = await sbClient.from('rooms')
                .update({ state: buildStateSnapshot(titleOverride), updated_at: new Date().toISOString() })
                .eq('room_code', roomCode);
            if (error) console.error("שגיאה בשמירת המצב המקוון", error);
        }

        function applyRemoteState(remoteState) {
            settings = { ...DEFAULT_SETTINGS, ...(remoteState.settings || {}) };
            players = remoteState.players || [];
            currentTurnIndex = remoteState.currentTurnIndex || 0;
            leadingBidderIndex = remoteState.leadingBidderIndex || 0;
            roundStarterIndex = remoteState.roundStarterIndex || 0;
            currentLotItem = remoteState.currentLotItem || null;
            currentRoundCounter = remoteState.currentRoundCounter || 1;
            filteredPlayers = remoteState.filteredPlayers || [];
            gameState = remoteState.gameState || { currentBid: 1, isInitial: true };
            autoFillState = remoteState.autoFillState || { active: false, playerId: null };
            readyUids = remoteState.readyUids || [];

            document.getElementById('mainTitle').innerText = remoteState.mainTitle || document.getElementById('mainTitle').innerText;

            const myPlayer = players.find(p => p.uid === myUid);
            if (myPlayer) mySeatIndex = myPlayer.id;

            const dashboard = document.getElementById('screenshotArea');
            dashboard.innerHTML = '';
            players.forEach(p => { dashboard.innerHTML += playerColumnHtml(p); });

            document.getElementById('modeSelectPanel').classList.add('hidden');
            document.getElementById('onlineChoicePanel').classList.add('hidden');
            document.getElementById('joinRoomPanel').classList.add('hidden');
            document.getElementById('roomLobbyPanel').classList.add('hidden');
            document.getElementById('setupPanel').classList.add('hidden');
            document.getElementById('gamePanel').classList.remove('hidden');

            renderUI();
        }

        // ---------- Small helpers ----------
        function escapeHtml(str) {
            return String(str).replace(/[&<>"']/g, ch => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[ch]));
        }

        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const temp = array[i];
                array[i] = array[j];
                array[j] = temp;
            }
        }

        function getLeagueDisplayName(fileName) {
            const data = leagueDataCache[fileName];
            if (!data || !data[0]) return fileName;
            return data[0].laegue || data[0].league || fileName;
        }

        function getPlayersForFile(fileName) {
            const data = leagueDataCache[fileName];
            if (!data) return [];
            const rawList = data.filter(item => item.name && item.team);
            const seen = new Set();
            const result = [];
            rawList.forEach(p => {
                const key = `${p.name.trim()}_${p.team.trim()}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    result.push({ name: p.name.trim(), team: p.team.trim() });
                }
            });
            return result;
        }

        // ---------- Lobby persistence (settings, names, league/team choices) ----------
        function saveLobbyToStorage() {
            const names = Array.from(document.querySelectorAll('.player-name-field')).map(f => f.value);
            const lobby = {
                settings,
                playerNames: names,
                leagueSlots: leagueSlots.map(s => ({ file: s.file, checkedTeams: s.checkedTeams }))
            };
            try {
                localStorage.setItem(LS_LOBBY, JSON.stringify(lobby));
            } catch (err) {
                console.error("שגיאה בשמירת הגדרות הלובי", err);
            }
        }

        let _savedPlayerNames = null;

        function loadLobbyFromStorage() {
            try {
                const raw = localStorage.getItem(LS_LOBBY);
                if (!raw) return;
                const lobby = JSON.parse(raw);
                if (lobby.settings) settings = { ...DEFAULT_SETTINGS, ...lobby.settings };
                _savedPlayerNames = Array.isArray(lobby.playerNames) ? lobby.playerNames : null;
                if (Array.isArray(lobby.leagueSlots)) {
                    leagueSlots = lobby.leagueSlots
                        .filter(s => availableLeagueFiles.includes(s.file))
                        .map(s => ({ file: s.file, checkedTeams: s.checkedTeams }));
                }
            } catch (err) {
                console.error("שגיאה בטעינת הגדרות הלובי", err);
            }
            settings.numLeagues = clamp(settings.numLeagues, 1, availableLeagueFiles.length || 1);
        }

        // ---------- Settings panel ----------
        function toggleSettingsPanel() {
            document.getElementById('settingsPanel').classList.toggle('hidden');
        }

        function renderSettingsInputs() {
            const maxLeagues = availableLeagueFiles.length || 1;
            document.getElementById('setNumPlayers').value = settings.numPlayers;
            document.getElementById('setBudget').value = settings.budget;
            document.getElementById('setTeamSize').value = settings.teamSize;
            document.getElementById('setNumLeagues').value = settings.numLeagues;
            document.getElementById('setNumLeagues').max = maxLeagues;
            document.getElementById('maxLeaguesHint').innerText = maxLeagues;
        }

        function applySettings() {
            const maxLeagues = availableLeagueFiles.length || 1;
            settings.numPlayers  = clamp(parseInt(document.getElementById('setNumPlayers').value) || DEFAULT_SETTINGS.numPlayers, 2, 10);
            settings.budget      = clamp(parseInt(document.getElementById('setBudget').value) || DEFAULT_SETTINGS.budget, 5, 100);
            settings.teamSize    = clamp(parseInt(document.getElementById('setTeamSize').value) || DEFAULT_SETTINGS.teamSize, 5, 12);
            settings.numLeagues  = clamp(parseInt(document.getElementById('setNumLeagues').value) || 1, 1, maxLeagues);

            renderSettingsInputs();
            renderPlayerNameInputs();
            renderLeagueSlots();
            saveLobbyToStorage();
            document.getElementById('settingsPanel').classList.add('hidden');
        }

        // ---------- Player name inputs ----------
        function renderPlayerNameInputs() {
            const container = document.getElementById('playerNamesContainer');
            container.innerHTML = '';
            const count = isOnline ? 1 : settings.numPlayers; // online: only the host types a name here - everyone else picks theirs when they join
            for (let i = 1; i <= count; i++) {
                const defaultVal = isOnline ? 'השם שלי' : `שחקן ${i}`;
                const val = (_savedPlayerNames && _savedPlayerNames[i - 1]) ? _savedPlayerNames[i - 1] : defaultVal;
                container.innerHTML += `<input type="text" class="name-input player-name-field" maxlength="12" value="${escapeHtml(val)}" onchange="saveLobbyToStorage()">`;
            }
        }

        // ---------- League slots (one per league included in the pool) ----------
        function renderLeagueSlots() {
            while (leagueSlots.length < settings.numLeagues) leagueSlots.push({ file: '', checkedTeams: null });
            leagueSlots = leagueSlots.slice(0, settings.numLeagues);

            const container = document.getElementById('leagueSlotsContainer');
            container.innerHTML = '';

            leagueSlots.forEach((slot, i) => {
                if (!slot.file && availableLeagueFiles.length) {
                    slot.file = availableLeagueFiles[i % availableLeagueFiles.length];
                }
                const div = document.createElement('div');
                div.className = 'panel league-slot';
                div.innerHTML = `
                    <h2>ליגה ${i + 1}</h2>
                    <select onchange="onLeagueSlotChange(${i})">
                        ${availableLeagueFiles.map(f => `<option value="${escapeHtml(f)}" ${f === slot.file ? 'selected' : ''}>${escapeHtml(getLeagueDisplayName(f))}</option>`).join('')}
                    </select>
                    <button class="toggle-all-btn" onclick="toggleAllTeamsInSlot(${i})">סמן/בטל הכל</button>
                    <div class="teams-toggle-list" id="teamsCheckboxes_${i}"></div>
                `;
                container.appendChild(div);
                renderTeamsForSlot(i);
            });

            saveLobbyToStorage();
        }

        function onLeagueSlotChange(i) {
            const select = document.querySelectorAll('#leagueSlotsContainer select')[i];
            leagueSlots[i].file = select.value;
            leagueSlots[i].checkedTeams = null; // reset to "all checked" for the newly picked league
            renderTeamsForSlot(i);
            saveLobbyToStorage();
        }

        function renderTeamsForSlot(i) {
            const slot = leagueSlots[i];
            const el = document.getElementById(`teamsCheckboxes_${i}`);
            if (!slot.file || !leagueDataCache[slot.file]) {
                el.innerHTML = '<div style="color: var(--muted-text); font-size:0.85rem;">טוען...</div>';
                return;
            }
            const playersInFile = getPlayersForFile(slot.file);
            const teams = [...new Set(playersInFile.map(p => p.team))].filter(Boolean).sort();
            const checkedSet = slot.checkedTeams ? new Set(slot.checkedTeams) : new Set(teams);

            el.innerHTML = teams.map(t => `
                <label class="team-item">
                    <input type="checkbox" class="team-cb" data-slot="${i}" value="${escapeHtml(t)}" ${checkedSet.has(t) ? 'checked' : ''} onchange="onTeamCheckboxChange(${i})">
                    <span>${escapeHtml(t)}</span>
                </label>
            `).join('');
        }

        function onTeamCheckboxChange(i) {
            const checked = Array.from(document.querySelectorAll(`.team-cb[data-slot="${i}"]`))
                                  .filter(cb => cb.checked)
                                  .map(cb => cb.value);
            leagueSlots[i].checkedTeams = checked;
            saveLobbyToStorage();
        }

        function toggleAllTeamsInSlot(i) {
            const checkboxes = document.querySelectorAll(`.team-cb[data-slot="${i}"]`);
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);
            checkboxes.forEach(cb => cb.checked = !allChecked);
            onTeamCheckboxChange(i);
        }

        // ---------- Navigation ----------
        function resetToHome() {
            if (confirm("האם אתה בטוח שברצונך לעזוב את המשחק הנוכחי ולחזור למסך הראשי?")) {
                if (isOnline && amIHost) {
                    closeRoomAsHost();
                    return;
                }
                if (!isOnline) localStorage.removeItem(LS_GAME);
                location.reload();
            }
        }

        function leaveToMainMenu() {
            if (isOnline && amIHost) {
                closeRoomAsHost();
                return;
            }
            if (!isOnline) localStorage.removeItem(LS_GAME);
            localStorage.removeItem(LS_LAST_ROOM);
            location.reload();
        }

        // Starts a fresh round with the SAME players (same names/seats) - just empties every
        // roster, refills every budget, and rebuilds the player pool from the same league/team
        // selections. Local mode does this instantly in the browser; online mode has the host
        // re-run the same "start" logic against the room's still-existing lobby data, which
        // resets everyone and pushes the new round to every connected device.
        function startNewRound() {
            if (isOnline) {
                if (!amIHost) {
                    alert("רק המארח יכול להתחיל סיבוב חדש.");
                    return;
                }
                const seatedUids = ((currentLobby && currentLobby.seats) || []).filter(s => s && s.uid).map(s => s.uid);
                const hostUid = currentLobby && currentLobby.hostUid;
                const stillIn = players.filter(p => seatedUids.includes(p.uid) && p.uid !== hostUid);
                const allReady = stillIn.length === 0 || stillIn.every(p => readyUids.includes(p.uid));
                if (!allReady) {
                    alert("עדיין לא כל השחקנים לחצו 'מוכן'.");
                    return;
                }
                hostStartOnlineGame();
                return;
            }

            const seenGlobal = new Set();
            filteredPlayers = [];
            leagueSlots.forEach((slot, i) => {
                if (!slot.file) return;
                const checked = Array.from(document.querySelectorAll(`.team-cb[data-slot="${i}"]`))
                                      .filter(cb => cb.checked)
                                      .map(cb => cb.value);
                getPlayersForFile(slot.file).filter(p => checked.includes(p.team)).forEach(p => {
                    const key = `${slot.file}_${p.name}_${p.team}`;
                    if (!seenGlobal.has(key)) { seenGlobal.add(key); filteredPlayers.push({ name: p.name, team: p.team }); }
                });
            });

            const totalSlotsNeeded = players.length * settings.teamSize;
            if (filteredPlayers.length < totalSlotsNeeded) {
                alert(`אין מספיק שחקנים בקבוצות שנבחרו כדי להתחיל סיבוב נוסף (צריך ${totalSlotsNeeded}, ויש רק ${filteredPlayers.length}).`);
                return;
            }

            shuffleArray(filteredPlayers);

            players.forEach(p => {
                p.money = settings.budget;
                p.roster = [];
                p.isOutFromCurrentLot = false;
            });

            currentRoundCounter = 1;
            currentLotItem = filteredPlayers.shift();
            gameState = { currentBid: 1, isInitial: true };
            roundStarterIndex = Math.floor(Math.random() * players.length);
            currentTurnIndex = roundStarterIndex;
            leadingBidderIndex = roundStarterIndex;
            autoFillState = { active: false, playerId: null };

            const dashboard = document.getElementById('screenshotArea');
            dashboard.innerHTML = '';
            players.forEach(p => { dashboard.innerHTML += playerColumnHtml(p); });

            document.getElementById('summaryPanel').classList.add('hidden');
            document.getElementById('gamePanel').classList.remove('hidden');

            saveGameState();
            renderUI();
        }

        // ---------- Starting a game ----------
        function startGame() {
            const nameFields = document.querySelectorAll('.player-name-field');
            players = [];
            currentRoundCounter = 1;

            nameFields.forEach((field, index) => {
                players.push({
                    id: index,
                    name: field.value.trim() || `שחקן ${index + 1}`,
                    money: settings.budget,
                    roster: [],
                    isOutFromCurrentLot: false,
                    color: PLAYER_COLORS[index % PLAYER_COLORS.length]
                });
            });

            const seenGlobal = new Set();
            filteredPlayers = [];
            leagueSlots.forEach((slot, i) => {
                if (!slot.file) return;
                const checked = Array.from(document.querySelectorAll(`.team-cb[data-slot="${i}"]`))
                                      .filter(cb => cb.checked)
                                      .map(cb => cb.value);
                const playersInFile = getPlayersForFile(slot.file).filter(p => checked.includes(p.team));
                playersInFile.forEach(p => {
                    const key = `${slot.file}_${p.name}_${p.team}`;
                    if (!seenGlobal.has(key)) {
                        seenGlobal.add(key);
                        filteredPlayers.push({ name: p.name, team: p.team });
                    }
                });
            });

            const totalSlotsNeeded = players.length * settings.teamSize;
            if (filteredPlayers.length < totalSlotsNeeded) {
                alert(`יש מעט מדי שחקנים בקבוצות שנבחרו! בשביל ${players.length} משתתפים (${settings.teamSize} בסגל כל אחד) צריך לפחות ${totalSlotsNeeded} שחקנים בסך הכל, ויש רק ${filteredPlayers.length}.`);
                return;
            }

            const leagueNames = leagueSlots.filter(s => s.file).map(s => getLeagueDisplayName(s.file));
            document.getElementById('mainTitle').innerText = `🏀 ${leagueNames.join(' + ')}`;

            shuffleArray(filteredPlayers);

            const dashboard = document.getElementById('screenshotArea');
            dashboard.innerHTML = '';
            players.forEach(p => { dashboard.innerHTML += playerColumnHtml(p); });

            currentLotItem = filteredPlayers.shift();

            gameState.currentBid = 1;
            gameState.isInitial = true;
            roundStarterIndex = Math.floor(Math.random() * players.length);
            currentTurnIndex = roundStarterIndex;
            leadingBidderIndex = roundStarterIndex;
            autoFillState = { active: false, playerId: null };

            saveLobbyToStorage();

            document.getElementById('setupPanel').classList.add('hidden');
            document.getElementById('gamePanel').classList.remove('hidden');

            saveGameState();
            renderUI();
        }

        function playerColumnHtml(p) {
            return `
                <div class="player-column" id="playerCol_${p.id}">
                    <span style="font-weight:bold; font-size:1.05rem; display: flex; align-items: center; gap: 6px;">
                        <span id="playerDot_${p.id}" style="width: 10px; height: 10px; background-color: ${p.color.border}; border-radius: 50%; display: inline-block;"></span>
                        ${escapeHtml(p.name)}
                    </span>
                    <span class="budget" id="playerMoney_${p.id}">$${p.money}</span>
                    <ul class="roster-list" id="playerRoster_${p.id}"></ul>
                </div>
            `;
        }

        // ---------- Turn / bidding logic ----------
        function persistState() {
            if (isOnline) {
                pushOnlineState().catch(err => console.error("שגיאה בשמירת המצב המקוון", err));
            } else {
                saveGameState();
            }
        }

        function handleAction(type, isAutoTimeout = false) {
            if (isOnline && !isAutoTimeout) {
                const activePlayerId = autoFillState.active ? autoFillState.playerId : currentTurnIndex;
                if (mySeatIndex !== activePlayerId) return; // not your turn - the UI shouldn't even let this happen
            }

            if (type === 'bid') {
                const amount = parseInt(document.getElementById('bidRange').value);
                gameState.currentBid = amount;
                leadingBidderIndex = currentTurnIndex;
                gameState.isInitial = false;

                moveToNextTurn();
            }
            else if (type === 'pass') {
                if (gameState.isInitial && currentTurnIndex === leadingBidderIndex) {
                    gameState.isInitial = false;
                    moveToNextTurn();
                } else {
                    players[currentTurnIndex].isOutFromCurrentLot = true;

                    const activeInLot = players.filter(p => !p.isOutFromCurrentLot && p.roster.length < settings.teamSize);

                    if (activeInLot.length <= 1) {
                        const winner = players[leadingBidderIndex];
                        const cost = gameState.currentBid;

                        winner.money -= cost;
                        winner.roster.push({
                            round: currentRoundCounter,
                            text: `${currentLotItem.name} - ${currentLotItem.team} ($${cost})`
                        });
                        currentRoundCounter++;

                        currentLotItem = filteredPlayers.shift();

                        if (checkAndHandleAutoFill()) {
                            return; // moved into the step-through auto-fill screen; it already rendered + saved
                        }

                        gameState.currentBid = 1;
                        gameState.isInitial = true;

                        players.forEach(p => p.isOutFromCurrentLot = false);

                        roundStarterIndex = (roundStarterIndex + 1) % players.length;

                        let loops = 0;
                        while (players[roundStarterIndex].roster.length >= settings.teamSize && loops < players.length) {
                            roundStarterIndex = (roundStarterIndex + 1) % players.length;
                            loops++;
                        }

                        leadingBidderIndex = roundStarterIndex;
                        currentTurnIndex = roundStarterIndex;
                    } else {
                        moveToNextTurn();
                    }
                }
            }
            persistState();
            renderUI();
        }

        // A fresh 30 seconds starts whenever the signature (whose turn + bid state) changes.
        // When it runs out, this calls the exact same handleAction('pass') the manual button
        // uses - which already auto-opens at $1 for the opener and auto-declines for everyone
        // else, so no separate "which case is this" logic is needed here.
        function ensureTurnTimer(signature) {
            if (signature !== turnTimerSignature) {
                turnTimerSignature = signature;
                turnTimerDeadline = Date.now() + TURN_TIME_LIMIT_MS;
                if (turnTimerHandle) clearInterval(turnTimerHandle);
                turnTimerHandle = setInterval(tickTurnTimer, 250);
            }
            tickTurnTimer();
        }

        function tickTurnTimer() {
            const el = document.getElementById('turnTimerDisplay');
            const remainingMs = turnTimerDeadline - Date.now();
            const remainingSec = Math.max(0, Math.ceil(remainingMs / 1000));
            if (el) el.innerText = `⏱ ${remainingSec} שניות לתור`;

            if (remainingMs <= 0) {
                if (turnTimerHandle) { clearInterval(turnTimerHandle); turnTimerHandle = null; }
                // Any connected client can carry out a timed-out turn - not just the active
                // player's own device. Since the resulting pass/open action is fully determined
                // by the current state, it doesn't matter who submits it; this also means the
                // game doesn't get stuck if the active player's own device is closed or offline.
                handleAction('pass', true);
            }
        }

        function clearTurnTimer() {
            if (turnTimerHandle) { clearInterval(turnTimerHandle); turnTimerHandle = null; }
            turnTimerSignature = null;
            const el = document.getElementById('turnTimerDisplay');
            if (el) el.innerText = '';
        }

        // Same pattern as the bidding timer, just a shorter 5s window and it confirms the
        // auto-fill pick instead of passing - reuses confirmAutoFillPick's own force=true bypass
        // so it works regardless of whose device actually fires it.
        function ensureAutoFillTimer(signature) {
            if (signature !== autoFillTimerSignature) {
                autoFillTimerSignature = signature;
                autoFillTimerDeadline = Date.now() + AUTO_FILL_TIME_LIMIT_MS;
                if (autoFillTimerHandle) clearInterval(autoFillTimerHandle);
                autoFillTimerHandle = setInterval(tickAutoFillTimer, 250);
            }
            tickAutoFillTimer();
        }

        function tickAutoFillTimer() {
            const el = document.getElementById('turnTimerDisplay');
            const remainingMs = autoFillTimerDeadline - Date.now();
            const remainingSec = Math.max(0, Math.ceil(remainingMs / 1000));
            if (el) el.innerText = `⏱ ${remainingSec} שניות להוספה אוטומטית`;

            if (remainingMs <= 0) {
                if (autoFillTimerHandle) { clearInterval(autoFillTimerHandle); autoFillTimerHandle = null; }
                confirmAutoFillPick(true);
            }
        }

        function clearAutoFillTimer() {
            if (autoFillTimerHandle) { clearInterval(autoFillTimerHandle); autoFillTimerHandle = null; }
            autoFillTimerSignature = null;
            const el = document.getElementById('turnTimerDisplay');
            if (el) el.innerText = '';
        }

        function moveToNextTurn() {
            let loops = 0;
            do {
                currentTurnIndex = (currentTurnIndex + 1) % players.length;
                loops++;
                if (loops > players.length * 2) break;
            } while (
                players[currentTurnIndex].isOutFromCurrentLot ||
                players[currentTurnIndex].roster.length >= settings.teamSize
            );
        }

        // ---------- Step-through auto-fill for the last remaining player ----------
        function checkAndHandleAutoFill() {
            const incompletePlayers = players.filter(p => p.roster.length < settings.teamSize);
            if (incompletePlayers.length === 1 && currentLotItem) {
                autoFillState = { active: true, playerId: incompletePlayers[0].id };
                persistState();
                renderUI();
                return true;
            }
            return false;
        }

        function confirmAutoFillPick(force = false) {
            if (isOnline && !force && mySeatIndex !== autoFillState.playerId) return;

            const player = players.find(p => p.id === autoFillState.playerId);
            player.roster.push({
                round: 0,
                text: `${currentLotItem.name} - ${currentLotItem.team} ($0)`
            });
            currentLotItem = filteredPlayers.shift();

            if (player.roster.length >= settings.teamSize || !currentLotItem) {
                autoFillState = { active: false, playerId: null };
            }

            persistState();
            renderUI();
        }

        // The host can force a stuck turn to advance at any time - reuses the exact same
        // deterministic paths the 30s timeout already uses, so it's safe regardless of who
        // triggers it and never conflicts with the normal turn-gating for everyone else.
        function hostForceSkip() {
            if (!isOnline || !amIHost) return;
            if (autoFillState.active) {
                confirmAutoFillPick(true);
            } else {
                handleAction('pass', true);
            }
        }

        // ---------- Rendering ----------
        function renderUI() {
            const allDone = players.every(p => p.roster.length >= settings.teamSize);

            if (allDone || (!currentLotItem && !autoFillState.active)) {
                clearTurnTimer();
                clearAutoFillTimer();

                document.getElementById('gamePanel').classList.add('hidden');
                document.getElementById('summaryPanel').classList.remove('hidden');

                players.forEach(p => {
                    document.getElementById(`playerMoney_${p.id}`).innerText = `$${p.money}`;
                    updateRosterList(`playerRoster_${p.id}`, p.roster);
                    const dot = document.getElementById(`playerDot_${p.id}`);
                    if (dot) dot.style.backgroundColor = p.color.border;
                });

                document.querySelectorAll('.player-column').forEach(el => {
                    el.style.borderColor = 'transparent';
                    el.style.backgroundColor = 'rgba(255,255,255,0.02)';
                });

                const summaryClone = document.getElementById('screenshotArea').cloneNode(true);
                summaryClone.removeAttribute('id');
                summaryClone.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));
                summaryClone.querySelectorAll('.budget').forEach(el => el.style.display = 'none');
                document.getElementById('finalTeamsContainer').innerHTML = '';
                document.getElementById('finalTeamsContainer').appendChild(summaryClone);

                if (!isOnline) {
                    localStorage.removeItem(LS_GAME);
                }
                // Note: the realtime channel is intentionally NOT torn down here anymore -
                // "New round" reuses the same room/channel instead of leaving it.

                const newRoundBtn = document.getElementById('newRoundBtn');
                const waitingNote = document.getElementById('waitingForHostNote');
                const readyCheckContainer = document.getElementById('readyCheckContainer');
                const readyBtn = document.getElementById('readyBtn');

                if (isOnline) {
                    // Ready-check replaces the old static "waiting for host" note - everyone can
                    // see exactly who's still not ready, and the host can start once everyone is.
                    waitingNote.classList.add('hidden');
                    readyCheckContainer.classList.remove('hidden');
                    if (amIHost) {
                        newRoundBtn.classList.remove('hidden');
                        readyBtn.classList.add('hidden');
                    } else {
                        newRoundBtn.classList.add('hidden');
                        readyBtn.classList.remove('hidden');
                    }
                    renderReadyCheckUI();
                } else {
                    readyCheckContainer.classList.add('hidden');
                    readyBtn.classList.add('hidden');
                    waitingNote.classList.add('hidden');
                    newRoundBtn.classList.remove('hidden');
                }
                return;
            }

            document.getElementById('gamePanel').classList.remove('hidden');
            document.getElementById('summaryPanel').classList.add('hidden');

            players.forEach(p => {
                document.getElementById(`playerMoney_${p.id}`).innerText = `$${p.money}`;
                updateRosterList(`playerRoster_${p.id}`, p.roster);
            });

            if (autoFillState.active) {
                renderAutoFillTurn();
            } else {
                renderNormalTurn();
            }
        }

        // Shows who's still seated for next round, who's already clicked "ready", and (host
        // only) a kick button per player - also drives whether "New Round" is enabled.
        function renderReadyCheckUI() {
            const container = document.getElementById('readyCheckContainer');
            const hostUid = currentLobby && currentLobby.hostUid;
            const seatedUids = ((currentLobby && currentLobby.seats) || []).filter(s => s && s.uid).map(s => s.uid);
            const stillIn = players.filter(p => seatedUids.includes(p.uid));
            // The host doesn't click "ready" themselves - they can start the next round as
            // soon as everyone ELSE still seated is ready, so they're excluded from the count.
            const needToBeReady = stillIn.filter(p => p.uid !== hostUid);
            const readyCount = needToBeReady.filter(p => readyUids.includes(p.uid)).length;
            const allReady = needToBeReady.length === 0 || readyCount === needToBeReady.length;

            let html = `<div style="margin-bottom:10px; color:var(--muted-text); font-size:0.9rem;">מוכנים לסיבוב הבא: ${readyCount}/${needToBeReady.length}</div>`;
            stillIn.forEach(p => {
                const isMe = p.uid === myUid;
                const isHostPlayer = p.uid === hostUid;
                const ready = isHostPlayer || readyUids.includes(p.uid);
                const kickBtn = (amIHost && !isMe)
                    ? `<button onclick="hostKickPlayer('${p.uid}')" style="background:var(--danger-color); color:white; border:none; border-radius:4px; padding:4px 9px; font-size:0.8rem; cursor:pointer; margin-right:8px;">✕</button>`
                    : '';
                const statusIcon = isHostPlayer ? '👑' : (ready ? '✅' : '⏳');
                html += `<div class="team-item" style="justify-content:space-between; background:rgba(0,0,0,0.15); padding:8px 10px; border-radius:6px; margin-bottom:6px;">
                            <span>${escapeHtml(p.name)} ${isMe ? '(אתה)' : ''}</span>
                            <span style="display:flex; align-items:center;">${statusIcon} ${kickBtn}</span>
                         </div>`;
            });
            container.innerHTML = html;

            const readyBtn = document.getElementById('readyBtn');
            if (!amIHost) {
                const myReady = readyUids.includes(myUid);
                readyBtn.disabled = myReady;
                readyBtn.innerText = myReady ? "ממתין לשאר השחקנים... ⏳" : "מוכן לסיבוב הבא ✅";
            }

            const newRoundBtn = document.getElementById('newRoundBtn');
            if (amIHost) {
                newRoundBtn.disabled = !allReady;
                newRoundBtn.innerText = allReady ? "סיבוב חדש 🔄" : `ממתין למוכנות (${readyCount}/${needToBeReady.length}) ⏳`;
            }
        }

        // Optimistic local update for instant feedback, then the atomic RPC makes it official -
        // uses jsonb array-append guarded by "not already there", so simultaneous ready-clicks
        // from different players can never lose each other's entries.
        async function markMyselfReady() {
            if (!isOnline || amIHost) return;
            if (!readyUids.includes(myUid)) readyUids.push(myUid);
            renderReadyCheckUI();
            document.getElementById('readyBtn').disabled = true;
            document.getElementById('readyBtn').innerText = "ממתין לשאר השחקנים... ⏳";
            try {
                const { error } = await sbClient.rpc('mark_ready', { p_room_code: roomCode, p_uid: myUid });
                if (error) {
                    console.error("שגיאה בסימון מוכנות", error);
                    alert("לא הצלחנו לסמן אותך כמוכן: " + error.message);
                }
            } catch (err) {
                console.error("שגיאה בסימון מוכנות", err);
                alert("שגיאה בסימון מוכנות.");
            }
        }

        function highlightColumn(playerId, color) {
            document.querySelectorAll('.player-column').forEach(col => {
                const pid = parseInt(col.id.replace('playerCol_', ''));
                const p = players.find(pl => pl.id === pid);
                if (!p) return;

                // Every card always shows an outline in its own player's color, in both modes -
                // this is just for quick visual identification, nothing is being "revealed".
                col.style.borderColor = p.color.border;

                // The strong full-color fill is reserved for:
                // - online: only your own seat, always - so you can spot yourself at a glance
                // - local (pass-the-phone): only whoever's turn it currently is - there's no
                //   single "you" to protect on a shared device, so this just tracks the turn
                const showFullFill = isOnline ? (mySeatIndex === pid) : (pid === playerId);
                col.style.backgroundColor = showFullFill ? p.color.bg : 'rgba(255,255,255,0.02)';
            });
        }

        function renderAutoFillTurn() {
            clearTurnTimer(); // the 30s bidding clock doesn't apply here - the 5s auto-fill clock does

            const player = players.find(p => p.id === autoFillState.playerId);

            const arenaEl = document.getElementById('gameArena');
            arenaEl.style.backgroundColor = player.color.bg;
            arenaEl.style.borderColor = player.color.border;
            highlightColumn(player.id, player.color);

            document.getElementById('turnDisplay').innerText = `🎁 השלמה אוטומטית עבור ${player.name}`;
            document.getElementById('currentLot').innerText = currentLotItem.name;
            document.getElementById('currentLotTeam').innerText = currentLotItem.team;
            document.getElementById('bidDisplay').innerText = `$0`;
            document.getElementById('bidder').innerText = '(ללא תחרות - שאר השחקנים כבר מלאו את הסגל)';

            document.getElementById('bidSliderContainer').classList.add('hidden');
            document.getElementById('normalActionBtns').classList.add('hidden');

            const autoBtn = document.getElementById('autoFillActionBtn');
            autoBtn.classList.remove('hidden');
            const isMine = !isOnline || mySeatIndex === player.id;
            autoBtn.disabled = !isMine;
            autoBtn.innerText = isMine ? "אישור, הבא ⏭️" : `ממתין ל-${player.name}...`;

            document.getElementById('hostSkipBtn').classList.toggle('hidden', !(isOnline && amIHost));

            // A fresh 5s clock for every distinct auto-fill step - the signature changes every
            // time a new lot comes up for this player, same idea as the bidding turn signature.
            const autoFillSignature = `${player.id}|${currentLotItem.name}|${currentLotItem.team}`;
